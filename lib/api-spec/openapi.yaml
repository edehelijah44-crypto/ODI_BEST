openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Social Media Auto-Publishing Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: platforms
    description: Social media platform connections
  - name: posts
    description: Content creation and publishing
  - name: schedule
    description: Scheduled posts
  - name: analytics
    description: Engagement analytics
  - name: profile
    description: User profile
  - name: billing
    description: Subscription and billing
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    put:
      operationId: updateProfile
      tags: [profile]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /platforms:
    get:
      operationId: listPlatforms
      tags: [platforms]
      summary: List connected platforms
      responses:
        "200":
          description: List of platform connections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlatformConnection"
    post:
      operationId: connectPlatform
      tags: [platforms]
      summary: Connect a social media platform (demo mode)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectPlatformRequest"
      responses:
        "200":
          description: Platform connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformConnection"

  /platforms/{platformId}:
    delete:
      operationId: disconnectPlatform
      tags: [platforms]
      summary: Disconnect a platform
      parameters:
        - name: platformId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Platform disconnected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /posts:
    get:
      operationId: listPosts
      tags: [posts]
      summary: List all posts
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, published, scheduled, failed]
        - name: limit
          in: query
          schema:
            type: number
        - name: offset
          in: query
          schema:
            type: number
      responses:
        "200":
          description: List of posts
          content:
            application/json:
              schema:
                type: object
                properties:
                  posts:
                    type: array
                    items:
                      $ref: "#/components/schemas/Post"
                  total:
                    type: number
                required: [posts, total]
    post:
      operationId: createPost
      tags: [posts]
      summary: Create a new post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePostRequest"
      responses:
        "201":
          description: Post created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /posts/{postId}:
    get:
      operationId: getPost
      tags: [posts]
      summary: Get a post by ID
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Post details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
    put:
      operationId: updatePost
      tags: [posts]
      summary: Update a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePostRequest"
      responses:
        "200":
          description: Post updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
    delete:
      operationId: deletePost
      tags: [posts]
      summary: Delete a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Post deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /posts/{postId}/publish:
    post:
      operationId: publishPost
      tags: [posts]
      summary: Publish a post to all connected platforms
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Post published
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishResult"

  /analytics:
    get:
      operationId: getAnalytics
      tags: [analytics]
      summary: Get analytics overview
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [7d, 30d, 90d]
            default: 30d
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsOverview"

  /billing/subscription:
    get:
      operationId: getSubscription
      tags: [billing]
      summary: Get current subscription
      responses:
        "200":
          description: Current subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionInfo"

  /billing/upgrade:
    post:
      operationId: upgradeSubscription
      tags: [billing]
      summary: Upgrade or change subscription plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpgradeSubscriptionRequest"
      responses:
        "200":
          description: Checkout session or confirmation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpgradeSubscriptionResponse"

  /billing/cancel:
    post:
      operationId: cancelSubscription
      tags: [billing]
      summary: Cancel subscription
      responses:
        "200":
          description: Cancellation confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /analytics/posts:
    get:
      operationId: getPostAnalytics
      tags: [analytics]
      summary: Get per-post analytics
      parameters:
        - name: limit
          in: query
          schema:
            type: number
      responses:
        "200":
          description: Post analytics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PostAnalytics"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        avatar:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, email, name, createdAt]

    UserProfile:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        displayName:
          type: string
        bio:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        avatar:
          type: string
          nullable: true
        postsCount:
          type: number
        followersCount:
          type: number
        platformsConnected:
          type: number
      required: [id, userId, displayName, postsCount, followersCount, platformsConnected]

    UpdateProfileRequest:
      type: object
      properties:
        displayName:
          type: string
        bio:
          type: string
          nullable: true
        website:
          type: string
          nullable: true

    PlatformConnection:
      type: object
      properties:
        id:
          type: string
        platform:
          type: string
          enum: [facebook, youtube, tiktok, instagram, twitter]
        accountName:
          type: string
        accountId:
          type: string
        connected:
          type: boolean
        connectedAt:
          type: string
          format: date-time
        followers:
          type: number
        avatar:
          type: string
          nullable: true
      required: [id, platform, accountName, accountId, connected, connectedAt, followers]

    ConnectPlatformRequest:
      type: object
      properties:
        platform:
          type: string
          enum: [facebook, youtube, tiktok, instagram, twitter]
        accountName:
          type: string
        accountId:
          type: string
      required: [platform, accountName, accountId]

    PlatformCaption:
      type: object
      properties:
        platform:
          type: string
          enum: [facebook, youtube, tiktok, instagram, twitter]
        caption:
          type: string
        hashtags:
          type: array
          items:
            type: string
      required: [platform, caption, hashtags]

    Post:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        title:
          type: string
        caption:
          type: string
        mediaUrl:
          type: string
          nullable: true
        mediaType:
          type: string
          enum: [image, video, text]
          nullable: true
        status:
          type: string
          enum: [draft, published, scheduled, failed]
        platforms:
          type: array
          items:
            type: string
            enum: [facebook, youtube, tiktok, instagram, twitter]
        platformCaptions:
          type: array
          items:
            $ref: "#/components/schemas/PlatformCaption"
        scheduledAt:
          type: string
          format: date-time
          nullable: true
        publishedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        totalLikes:
          type: number
        totalViews:
          type: number
        totalShares:
          type: number
        totalComments:
          type: number
      required: [id, userId, title, caption, status, platforms, platformCaptions, createdAt, updatedAt, totalLikes, totalViews, totalShares, totalComments]

    CreatePostRequest:
      type: object
      properties:
        title:
          type: string
        caption:
          type: string
        mediaUrl:
          type: string
          nullable: true
        mediaType:
          type: string
          enum: [image, video, text]
          nullable: true
        platforms:
          type: array
          items:
            type: string
            enum: [facebook, youtube, tiktok, instagram, twitter]
        platformCaptions:
          type: array
          items:
            $ref: "#/components/schemas/PlatformCaption"
        scheduledAt:
          type: string
          format: date-time
          nullable: true
      required: [title, caption, platforms, platformCaptions]

    UpdatePostRequest:
      type: object
      properties:
        title:
          type: string
        caption:
          type: string
        mediaUrl:
          type: string
          nullable: true
        mediaType:
          type: string
          enum: [image, video, text]
          nullable: true
        platforms:
          type: array
          items:
            type: string
        platformCaptions:
          type: array
          items:
            $ref: "#/components/schemas/PlatformCaption"
        scheduledAt:
          type: string
          format: date-time
          nullable: true

    PublishResult:
      type: object
      properties:
        postId:
          type: string
        status:
          type: string
          enum: [published, partial, failed]
        results:
          type: array
          items:
            type: object
            properties:
              platform:
                type: string
              success:
                type: boolean
              postUrl:
                type: string
                nullable: true
              error:
                type: string
                nullable: true
            required: [platform, success]
      required: [postId, status, results]

    AnalyticsOverview:
      type: object
      properties:
        totalPosts:
          type: number
        totalViews:
          type: number
        totalLikes:
          type: number
        totalShares:
          type: number
        totalComments:
          type: number
        growthRate:
          type: number
        topPlatform:
          type: string
          nullable: true
        chartData:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              views:
                type: number
              likes:
                type: number
              shares:
                type: number
            required: [date, views, likes, shares]
        platformBreakdown:
          type: array
          items:
            type: object
            properties:
              platform:
                type: string
              views:
                type: number
              likes:
                type: number
              posts:
                type: number
            required: [platform, views, likes, posts]
      required: [totalPosts, totalViews, totalLikes, totalShares, totalComments, growthRate, chartData, platformBreakdown]

    SubscriptionInfo:
      type: object
      properties:
        plan:
          type: string
          enum: [free, starter, pro, business]
        status:
          type: string
          enum: [active, canceled, past_due, trialing]
        currentPeriodEnd:
          type: string
          format: date-time
          nullable: true
        cancelAtPeriodEnd:
          type: boolean
        postsLimit:
          type: number
        platformsLimit:
          type: number
        schedulingEnabled:
          type: boolean
        analyticsEnabled:
          type: boolean
      required: [plan, status, cancelAtPeriodEnd, postsLimit, platformsLimit, schedulingEnabled, analyticsEnabled]

    UpgradeSubscriptionRequest:
      type: object
      properties:
        plan:
          type: string
          enum: [starter, pro, business]
      required: [plan]

    UpgradeSubscriptionResponse:
      type: object
      properties:
        checkoutUrl:
          type: string
          nullable: true
        plan:
          type: string
        message:
          type: string
      required: [plan, message]

    PostAnalytics:
      type: object
      properties:
        postId:
          type: string
        title:
          type: string
        platforms:
          type: array
          items:
            type: string
        views:
          type: number
        likes:
          type: number
        shares:
          type: number
        comments:
          type: number
        publishedAt:
          type: string
          format: date-time
          nullable: true
      required: [postId, title, platforms, views, likes, shares, comments]
